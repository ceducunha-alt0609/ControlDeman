<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12"/>
      <stop offset="100%" style="stop-color:#1a2035"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#63b3ed"/>
      <stop offset="100%" style="stop-color:#3182ce"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="#63b3ed" stroke-width="2" stroke-opacity="0.15"/>

  <!-- House body -->
  <rect x="156" y="225" width="200" height="195" rx="8" fill="url(#icon)" opacity="0.9"/>

  <!-- Roof -->
  <polygon points="256,82 116,235 396,235" fill="url(#icon)"/>
  <polygon points="256,82 116,235 396,235" fill="url(#shine)"/>

  <!-- Door -->
  <rect x="218" y="322" width="76" height="98" rx="7" fill="#0a0d12" opacity="0.65"/>

  <!-- Left window -->
  <rect x="168" y="252" width="52" height="46" rx="6" fill="#0a0d12" opacity="0.5"/>
  <rect x="172" y="256" width="22" height="18" rx="2" fill="#63b3ed" opacity="0.35"/>

  <!-- Right window -->
  <rect x="292" y="252" width="52" height="46" rx="6" fill="#0a0d12" opacity="0.5"/>
  <rect x="296" y="256" width="22" height="18" rx="2" fill="#63b3ed" opacity="0.35"/>

  <!-- Star badge (síndico) -->
  <circle cx="256" cy="166" r="22" fill="#f59e0b"/>
  <circle cx="256" cy="166" r="22" fill="none" stroke="#0a0d12" stroke-width="2" opacity="0.2"/>
  <text x="256" y="174" text-anchor="middle" fill="white" font-family="Arial" font-size="24" font-weight="900">★</text>

  <!-- Shine overlay top half -->
  <rect width="512" height="256" rx="112" ry="0" fill="url(#shine)"/>
  <rect x="0" y="0" width="512" height="256" rx="112" fill="none"/>
</svg>
